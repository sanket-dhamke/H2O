# Render Blueprint for the H2O backend API.
# In Render: New + -> Blueprint -> connect this repo. Render reads this file.
# Set the "sync: false" secrets in the dashboard after the service is created.
services:
  - type: web
    name: h2o-api
    runtime: node
    rootDir: server
    plan: free
    # Render injects PORT; the server already binds to it on 0.0.0.0.
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: JWT_SECRET
        generateValue: true
      # Supabase Postgres connection string (Session pooler / direct, port 5432).
      - key: DATABASE_URL
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # AI (Groq / OpenAI-compatible). Optional but already working locally.
      - key: AI_BASE_URL
        sync: false
      - key: AI_API_KEY
        sync: false
      - key: AI_CHAT_MODEL
        sync: false
      - key: AI_TRANSCRIBE_MODEL
        sync: false
      # Optional Supabase Storage for visitor photos.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        sync: false
